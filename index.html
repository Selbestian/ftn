<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 视频导航</title>
    <style>
        /* 页面基础样式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500vh;
            margin: 0;
            padding: 20px;
        }

        /* 标题样式 */
        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* 按钮容器 */
        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        /* 按钮样式 */
        .video-button {
            padding: 15px 20px;
            background-color: #ff0000; /* YouTube 红色 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-align: center;
            text-decoration: none; /* 去除链接下划线 */
            display: block; /* 让链接表现得像按钮 */
        }

        /* 鼠标悬停效果 */
        .video-button:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>
    <h1>YouTube 视频导航</h1>
    <div class="button-container">
        <!-- 视频按钮 1 -->
        <a href="https://www.youtube.com/watch?v=f1iwhiebHLA&list=RDZGCckws9SJI&index=8" 
           class="video-button" 
           target="_blank">fully</a>
        
        <!-- 视频按钮 2 -->
        <a href="https://www.youtube.com/watch?v=YfXpNIQbdjo&list=RDZGCckws9SJI&index=3" 
           class="video-button" 
           target="_blank">made</a>
        
        <!-- 视频按钮 3 -->
        <a href="https://www.youtube.com/watch?v=BmmMfZR8C80&list=RDZGCckws9SJI&index=2" 
           class="video-button" 
           target="_blank">by</a>
        
        <!-- 视频按钮 4 -->
        <a href="https://www.youtube.com/watch?v=ZGCckws9SJI&list=RDZGCckws9SJI&index=1" 
           class="video-button" 
           target="_blank">AI</a>
    </div>
</body>
</html>
